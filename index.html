<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pesquisa Culturama</title>
</head>
<body>
    <header>
        <h1>Pesquisa Online</h1>
    </header>
    <section>
        <form action="" method="get">
            <fieldset>

            <!-- DADOS PESSOAIS -->
             <legend>Dados Pesoais</legend>
            <label for="userName">Nome</label>
            <input type="text" name="userName" required>
            <br>
            <label for="age">Idade</label>
            <input type="number" name="userAge" min="12" max="100" required>
            <br>
            <label for="birthDate">Data de nascimento</label>
            <input type="date" name="birthDate">
            <br>
            <label for="userEmail">Email</label>
            <input type="email" name="userEmail" required>
            <br>
            <label for="userPhoneNumber">Telefone</label>
            <input type="tel" name="userPhoneNumber" pattern="[0-9]{11}" placeholder="DDD + numero sem espaços ou hífen">
            <br>
            <label for="userImage">Upload de foto</label>
            <input type="file" accept="image/*" name="userImage">
            <br>
            </fieldset>
            <br>
            <button type="submit">Enviar</button>
        </form>
    </section>
    
    <br>
    
    <section>
        <form action="" method="get">
            <fieldset>

            <!-- hábitos -->
            <legend>Hábitos</legend>
            <p>Redes sociais</p>
            <input type="checkbox" name="social" value="Instagram" id="social">
            <label for="social">Instagram</label>
            <br>
            <input type="checkbox" name="social" value="Facebook" id="social2">
            <label for="social2">Facebook</label>
            <br>
            <input type="checkbox" name="social" value="Twitter" id="social3">
            <label for="social3">Twitter</label>
            <br>
            <input type="checkbox" name="social" value="Linkedin" id="social4">
            <label for="social4">Linkedin</label>
            </fieldset>
            <br> 
            <button type="submit">Enviar</button>
        </form>
    </section>

</body>
</html>
